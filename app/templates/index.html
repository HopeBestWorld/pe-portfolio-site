<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta property="og:title" content="Personal Portfolio">
    <meta property="og:description" content="My Personal Portfolio">
    <meta property="og:url" content="{{ url }}">

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
        rel="stylesheet">

    <link lang='sass' rel="stylesheet" href="./static/styles/main.css">
    <link rel='icon' href='./static/img/favicon.ico' type='image/x-icon' />
    <title>{{ title }}</title>
</head>

<body>
    <header class="nav-bar">
        <div class="nav-content">
            <a href="/">
                <div class="nav-logo">
                    <img src="./static/img/logo.svg" />
                </div>
            </a>
        </div>
    </header>

    <div class="profile">
        <div id="profile-picture" class="profile-picture">
            <img src="./static/img/lauren-1011042273-1.jpg" alt="Hope Best Profile Photo">
        </div>
        <h1>{{ title }}</h1>
    </div>

    <main style="max-width: 800px; margin: -20px auto 50px auto; padding: 0 20px;">
        <section class="card"
            style="background: white; border-radius: 16px; padding: 30px; box-shadow: 0 6px 16px rgba(0,0,0,0.02); text-align: center; border: 1px solid #f5ebe6;">
            <h2 style="color: #b85436; font-size: 28px; margin-top: 0; margin-bottom: 15px;">Welcome to My Story! ✨</h2>
            <p
                style="font-size: 1.1rem; line-height: 1.7; color: #4a3e3d; margin: 0; text-align: justify; text-justify: inter-word;">
                {{ about_me }}
            </p>
        </section>
    </main>
</body>

</html>
